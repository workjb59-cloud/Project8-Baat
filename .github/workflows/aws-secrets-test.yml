name: Test AWS Secrets

on:
  push:
  workflow_dispatch:

jobs:
  test-secrets:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Check Secrets Exist
        run: |
          echo "Checking if secrets are configured..."
          
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ]; then
            echo "❌ AWS_ACCESS_KEY_ID is not set"
            exit 1
          else
            echo "✅ AWS_ACCESS_KEY_ID is set"
          fi
          
          if [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ]; then
            echo "❌ AWS_SECRET_ACCESS_KEY is not set"
            exit 1
          else
            echo "✅ AWS_SECRET_ACCESS_KEY is set"
          fi
          
          if [ -z "${{ secrets.S3_BUCKET_NAME }}" ]; then
            echo "❌ S3_BUCKET_NAME is not set"
            exit 1
          else
            echo "✅ S3_BUCKET_NAME is set"
          fi
          
          echo ""
          echo "All secrets are configured! ✅"
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name: Test AWS Connection
        run: |
          echo "Testing AWS credentials..."
          aws sts get-caller-identity
      
      - name: Test S3 Bucket Access
        run: |
          echo "Testing S3 bucket: ${{ secrets.S3_BUCKET_NAME }}"
          aws s3 ls s3://${{ secrets.S3_BUCKET_NAME }} || echo "Bucket access test completed"
