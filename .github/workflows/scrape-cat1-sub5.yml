name: Boutiqaat Scraper - Group 5 

on:
  schedule:
    # Run every day at 6 AM UTC
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright browsers
      run: |
        playwright install chromium
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Run scraper - Group 5
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
      run: |
        python -m women_cat1_sub5.main
    
    - name: Job summary
      if: always()
      run: |
        echo "Scraping job completed with status: ${{ job.status }}"

  notify:
    runs-on: ubuntu-latest
    needs: scrape
    if: always()
    
    steps:
    - name: Job Summary
      run: |
        echo "## Boutiqaat Scraping - Group 5" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ needs.scrape.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Date**: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- **Categories**: 8 subcategories (brush-holders-accessories to eye-palettes)" >> $GITHUB_STEP_SUMMARY
        echo "- **Uploaded to**: S3 boutiqaat-data bucket" >> $GITHUB_STEP_SUMMARY
