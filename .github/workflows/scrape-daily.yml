name: Boutiqaat Daily Data Scrape

on:
  schedule:
    # Run every day at 2 AM UTC (adjust time as needed)
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    
    - name: Run scraper
      env:
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
      run: |
        python -m women_cat1.main
    
    - name: Upload logs to S3 on failure
      if: failure()
      run: |
        aws s3 cp logs/ s3://${{ secrets.S3_BUCKET_NAME }}/boutiqaat-data/logs/ --recursive || true
    
    - name: Notify on completion
      if: always()
      run: |
        echo "Scraping job completed with status: ${{ job.status }}"

  # Optional: Create a summary notification
  notify:
    runs-on: ubuntu-latest
    needs: scrape
    if: always()
    
    steps:
    - name: Job Summary
      run: |
        echo "## Boutiqaat Scraping Pipeline" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ${{ needs.scrape.result }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Date**: $(date)" >> $GITHUB_STEP_SUMMARY
        echo "- **Uploaded to**: S3 bucket" >> $GITHUB_STEP_SUMMARY
